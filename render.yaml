services:
  - type: web
    name: book-recommendation-api
    env: docker
    plan: free # or starter
    # Render overrides the port with a dynamic $PORT env var, which Uvicorn respects when passed correctly
    # But usually, providing the Dockerfile is enough, Render will run the CMD.
    envVars:
      - key: MODEL_NAME
        value: "BAAI/bge-small-en-v1.5"
      - key: CSV_PATH
        value: "books.csv"
      - key: FAISS_INDEX_PATH
        value: "books.faiss"
      - key: TOP_K
        value: "5"
      - key: BATCH_SIZE
        value: "32"
